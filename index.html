<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-box">
    <h2>Login</h2>

    <form onsubmit="return loginUser()">

        <input type="email" id="email" placeholder="Enter Email" oninput="checkFields()">

        <div class="password-box">
            <input type="password" id="password" placeholder="Enter Password" oninput="checkFields()">
            <span onclick="togglePassword()" id="toggle">Show</span>
        </div>

        <button type="submit" id="loginBtn" disabled>Login</button>

        <p id="error-msg"></p>

    </form>

    <p class="forgot" onclick="forgotPassword()">Forgot Password?</p>
</div>

<script>
let email = document.getElementById("email");
let password = document.getElementById("password");
let btn = document.getElementById("loginBtn");
let msg = document.getElementById("error-msg");

// 1. Disable button if empty
function checkFields() {
    if (email.value.trim() === "" || password.value.trim() === "") {
        btn.disabled = true;
        btn.style.opacity = "0.5";
    } else {
        btn.disabled = false;
        btn.style.opacity = "1";
    }

    msg.innerText = "";
}

// 2. Show/Hide password
function togglePassword() {
    if (password.type === "password") {
        password.type = "text";
        document.getElementById("toggle").innerText = "Hide";
    } else {
        password.type = "password";
        document.getElementById("toggle").innerText = "Show";
    }
}

// 3. Forgot password dummy msg
function forgotPassword() {
    alert("Password reset link sent to your email ");
}

// 4. Login validation
function loginUser() {

    let emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    if (!emailPattern.test(email.value)) {
        msg.innerText = "Enter valid email";
        return false;
    }

    if (password.value.length < 6) {
        msg.innerText = "Password must be at least 6 characters";
        return false;
    }

    msg.style.color = "green";
    msg.innerText = "Login Successful!";

    // clear fields after success
    email.value = "";
    password.value = "";
    btn.disabled = true;
    btn.style.opacity = "0.5";

    return false; // stop reload
}
</script>

</body>
</html>
